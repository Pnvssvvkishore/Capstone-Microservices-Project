{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4"><i class="fas fa-box"></i> My Orders</h1>
<div class="card shadow">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <tr>
                        <th><i class="fas fa-hashtag"></i> Order ID</th>
                        <th><i class="fas fa-box-open"></i> Product ID</th>
                        <th><i class="fas fa-user"></i> User ID</th>
                        <th><i class="fas fa-info-circle"></i> Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% for order in orders %}
                    <tr>
                        <td><strong>#{{ order.id }}</strong></td>
                        <td>{{ order.product_id }}</td>
                        <td>{{ order.user_id }}</td>
                        <td><span class="badge bg-success"><i class="fas fa-check-circle"></i> Confirmed</span></td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center">
                            <div class="py-4">
                                <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
                                <p class="lead">No orders yet. Start shopping!</p>
                                <a href="{{ url_for('index') }}" class="btn btn-primary">Browse Products</a>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
