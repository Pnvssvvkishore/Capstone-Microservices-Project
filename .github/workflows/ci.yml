name: Microservices CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install dependencies for testing
      run: |
        python -m pip install --upgrade pip
        # Install all required testing packages across all microservices
        pip install flask pytest pytest-cov requests flask-sqlalchemy psycopg2-binary jwt tenacity flask-limiter textblob pika redis prometheus-flask-exporter
        python -m textblob.download_corpora

    - name: Run Unit Tests with Coverage
      # Only target the tests directory to avoid running utility scripts which cause errors
      run: |
        pytest tests/ --cov=. --cov-report=xml

    - name: SonarCloud Scan
      continue-on-error: true # Allows CI to pass even if SonarCloud token is missing
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 

    - name: Upload Coverage to Codecov
      continue-on-error: true # Allows CI to pass even if Codecov token is missing
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

    - name: Docker Config Check
      run: |
        docker compose config || docker-compose config
