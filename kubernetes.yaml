---
# ============================================================
# PERSISTENT VOLUME CLAIM - PostgreSQL data persistence
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# ============================================================
# POSTGRES
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: microservices_db
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
# ============================================================
# REDIS
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  ports:
    - port: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
---
# ============================================================
# RABBITMQ
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  ports:
    - port: 5672
      name: amqp
    - port: 15672
      name: management
  selector:
    app: rabbitmq
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
# ============================================================
# USER SERVICE (port 5001)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  ports:
    - port: 5001
      targetPort: 5001
  selector:
    app: user-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: microservices-project-user-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/microservices_db
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:5004
            - name: SECRET_KEY
              value: super_secret_jwt_key
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ============================================================
# PRODUCT SERVICE (port 5002)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  ports:
    - port: 5002
      targetPort: 5002
  selector:
    app: product-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: microservices-project-product-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/microservices_db
            - name: REDIS_URL
              value: redis://redis:6379
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ============================================================
# ORDER SERVICE (port 5003)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  ports:
    - port: 5003
      targetPort: 5003
  selector:
    app: order-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: microservices-project-order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/microservices_db
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:5002
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:5004
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ============================================================
# NOTIFICATION SERVICE (port 5004)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  ports:
    - port: 5004
      targetPort: 5004
  selector:
    app: notification-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: microservices-project-notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5004
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/microservices_db
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          livenessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ============================================================
# REVIEW SERVICE (port 5005)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: review-service
spec:
  ports:
    - port: 5005
      targetPort: 5005
  selector:
    app: review-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      containers:
        - name: review-service
          image: microservices-project-review-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5005
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/microservices_db
            - name: SENTIMENT_SERVICE_URL
              value: http://sentiment-service:5006
          livenessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ============================================================
# SENTIMENT SERVICE (port 5006)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: sentiment-service
spec:
  ports:
    - port: 5006
      targetPort: 5006
  selector:
    app: sentiment-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentiment-service
  template:
    metadata:
      labels:
        app: sentiment-service
    spec:
      containers:
        - name: sentiment-service
          image: microservices-project-sentiment-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5006
              name: sentiment-svc
          livenessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ============================================================
# API GATEWAY (port 5000) — exposed via NodePort 30080
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: microservices-project-api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: USER_SERVICE_URL
              value: http://user-service:5001
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:5002
            - name: ORDER_SERVICE_URL
              value: http://order-service:5003
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:5004
            - name: REVIEW_SERVICE_URL
              value: http://review-service:5005
            - name: SENTIMENT_SERVICE_URL
              value: http://sentiment-service:5006
            - name: SECRET_KEY
              value: super_secret_jwt_key
            - name: REDIS_URL
              value: redis://redis:6379
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ============================================================
# FRONTEND (port 8081 inside, exposed via NodePort 30081)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  ports:
    - port: 8081
      targetPort: 5005
      nodePort: 30081
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: microservices-project-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5005
          env:
            - name: API_GATEWAY_URL
              value: http://api-gateway:5000
            - name: FLASK_SECRET_KEY
              value: dev_secret
          livenessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ============================================================
# PROMETHEUS (port 9090) — exposed via NodePort 30090
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'api-gateway'
        static_configs:
          - targets: ['api-gateway:5000']
      - job_name: 'user-service'
        static_configs:
          - targets: ['user-service:5001']
      - job_name: 'product-service'
        static_configs:
          - targets: ['product-service:5002']
      - job_name: 'order-service'
        static_configs:
          - targets: ['order-service:5003']
      - job_name: 'notification-service'
        static_configs:
          - targets: ['notification-service:5004']
      - job_name: 'review-service'
        static_configs:
          - targets: ['review-service:5005']
      - job_name: 'sentiment-service'
        static_configs:
          - targets: ['sentiment-service:5006']
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
  selector:
    app: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
# ============================================================
# GRAFANA (port 3000) — exposed via NodePort 30030
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
  selector:
    app: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
---
# ============================================================
# INGRESS — Route external traffic to api-gateway & frontend
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: microservices.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8081
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 5000
